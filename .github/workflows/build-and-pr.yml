name: Build and sync to iOS repo

on:
  push:
    branches: [main]
    paths:
      - tokens.json
      - style-dictionary.config.js
      - build.js
      - package.json
      - package-lock.json
      - .github/workflows/build-and-pr.yml
  workflow_dispatch: {}

concurrency:
  group: design-tokens-sync
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# 사용 전 사전 준비:
#   1. 이 레포의 Settings → Secrets and variables → Actions 에
#      `IOS_REPO_PAT` 시크릿을 등록한다.
#      (타겟 레포의 Contents: Read and write + Pull requests: Read and write
#       권한을 가진 fine-grained PAT)
#   2. 아래 env 값 / 'Replace artifacts' step 의 매핑이 타겟 레포 디렉토리
#      구조와 일치하는지 확인한다.
# ─────────────────────────────────────────────────────────────────────────────
env:
  TARGET_REPO: DDD-Community/DDD-13-iOS2-iOS
  TARGET_BRANCH_BASE: develop
  # Auto-PR 브랜치는 워크플로우 실행마다 새로 생성된다.
  # 최종 이름: `chore/design-tokens-sync-YYYYMMDD-HHMMSS` (UTC).
  TARGET_BRANCH_PREFIX: chore/design-tokens-sync
  # 타겟 레포 안 베이스 경로 (모든 산출물의 공통 prefix)
  IOS_BASE: Projects/Shared/DesignSystem

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout design-tokens
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Style Dictionary
        run: npm run build

      - name: Verify build outputs exist
        run: |
          set -euo pipefail
          test -d build/ios/Colors.xcassets
          test -f build/ios/Colors.xcassets/Contents.json
          for f in \
            Colors+Generated.swift \
            Typography+Generated.swift \
            Spacing+Generated.swift \
            Sizing+Generated.swift \
            BorderRadius+Generated.swift \
            BorderWidth+Generated.swift \
            Opacity+Generated.swift \
            BoxShadow+Generated.swift
          do
            test -f "build/ios/$f" || { echo "::error::missing build/ios/$f"; exit 1; }
          done
          colorset_count=$(find build/ios/Colors.xcassets -maxdepth 1 -name '*.colorset' -type d | wc -l)
          if [ "$colorset_count" -lt 1 ]; then
            echo "::error::No .colorset entries were generated"
            exit 1
          fi
          echo "Generated $colorset_count colorset entries"

      - name: Compute timestamped branch name
        id: branch
        run: |
          ts=$(date -u +'%Y%m%d-%H%M%S')
          name="${TARGET_BRANCH_PREFIX}-${ts}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "Auto-PR branch: ${name}"

      - name: Checkout target iOS repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.IOS_REPO_PAT }}
          path: ios-repo
          ref: ${{ env.TARGET_BRANCH_BASE }}
          fetch-depth: 0

      - name: Replace generated artifacts in target repo
        run: |
          set -euo pipefail

          BASE="ios-repo/${IOS_BASE}"

          # 1) Asset Catalog (color tokens) — full replace to handle renames/deletes.
          rm -rf "${BASE}/Resources/Colors.xcassets"
          mkdir -p "${BASE}/Resources"
          cp -R build/ios/Colors.xcassets "${BASE}/Resources/Colors.xcassets"

          # 2) Per-category Swift files — overwrite at the iOS team's documented paths.
          #
          #    src (build/ios/...)               → dest (relative to IOS_BASE/)
          #    ------------------------------    ----------------------------------------------------
          #    Colors+Generated.swift            → Sources/Color/Generated/Colors+Generated.swift
          #    Typography+Generated.swift        → Sources/CustomFont/Generated/Typography+Generated.swift
          #    Spacing+Generated.swift           → Sources/Tokens/Generated/Spacing+Generated.swift
          #    Sizing+Generated.swift            → Sources/Tokens/Generated/Sizing+Generated.swift
          #    BorderRadius+Generated.swift      → Sources/Tokens/Generated/BorderRadius+Generated.swift
          #    BorderWidth+Generated.swift       → Sources/Tokens/Generated/BorderWidth+Generated.swift
          #    Opacity+Generated.swift           → Sources/Tokens/Generated/Opacity+Generated.swift
          #    BoxShadow+Generated.swift         → Sources/Tokens/Generated/BoxShadow+Generated.swift
          copy() {
            local src="build/ios/$1"
            local dest="${BASE}/$2"
            mkdir -p "$(dirname "${dest}")"
            cp "${src}" "${dest}"
            echo "  copied → ${dest#ios-repo/}"
          }

          copy "Colors+Generated.swift"       "Sources/Color/Generated/Colors+Generated.swift"
          copy "Typography+Generated.swift"   "Sources/CustomFont/Generated/Typography+Generated.swift"
          copy "Spacing+Generated.swift"      "Sources/Tokens/Generated/Spacing+Generated.swift"
          copy "Sizing+Generated.swift"       "Sources/Tokens/Generated/Sizing+Generated.swift"
          copy "BorderRadius+Generated.swift" "Sources/Tokens/Generated/BorderRadius+Generated.swift"
          copy "BorderWidth+Generated.swift"  "Sources/Tokens/Generated/BorderWidth+Generated.swift"
          copy "Opacity+Generated.swift"      "Sources/Tokens/Generated/Opacity+Generated.swift"
          copy "BoxShadow+Generated.swift"    "Sources/Tokens/Generated/BoxShadow+Generated.swift"

      - name: Open PR in target repo
        uses: peter-evans/create-pull-request@v6
        with:
          path: ios-repo
          token: ${{ secrets.IOS_REPO_PAT }}
          base: ${{ env.TARGET_BRANCH_BASE }}
          branch: ${{ steps.branch.outputs.name }}
          delete-branch: true
          title: '[CHORE] design-tokens 자동 반영'
          commit-message: |
            [CHORE]: design-tokens 자동 반영

            source: ${{ github.repository }}@${{ github.sha }}
          labels: |
            design-tokens
            auto-generated
          body: |
            ## 자동 생성된 디자인 토큰 반영

            **Source**: [`${{ github.repository }}@${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Trigger**: `${{ github.event_name }}` on `${{ github.ref_name }}`
            **Workflow run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Branch**: `${{ steps.branch.outputs.name }}` → `${{ env.TARGET_BRANCH_BASE }}`

            ### 변경된 파일 (베이스: `${{ env.IOS_BASE }}/`)
            - `Resources/Colors.xcassets/` (Asset Catalog)
            - `Sources/Color/Generated/Colors+Generated.swift`
            - `Sources/CustomFont/Generated/Typography+Generated.swift`
            - `Sources/Tokens/Generated/Spacing+Generated.swift`
            - `Sources/Tokens/Generated/Sizing+Generated.swift`
            - `Sources/Tokens/Generated/BorderRadius+Generated.swift`
            - `Sources/Tokens/Generated/BorderWidth+Generated.swift`
            - `Sources/Tokens/Generated/Opacity+Generated.swift`
            - `Sources/Tokens/Generated/BoxShadow+Generated.swift`

            ### 머지 후 작업
            신규 파일이 Xcode 프로젝트에 반영되도록 로컬에서 아래를 실행한다.

            ```bash
            ./tuisttool generate && tuist graph
            ```

            > 자동 생성된 PR입니다. 토큰 변경 시마다 새 브랜치/새 PR이 생성되므로
            > 머지하지 않은 채로 누적될 수 있습니다. 머지 후엔 브랜치가 자동 삭제됩니다.
